<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#F5E6CC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="368" rx="8" fill="none" stroke="#D4A853" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Paw icon -->
  <text x="200" y="140" text-anchor="middle" font-size="64" filter="url(#shadow)">🐾</text>
  <!-- Breed name -->
  <text x="200" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#C4956A" font-weight="bold">Chocolate Floppy-Ear Style</text>
  <!-- Color -->
  <text x="200" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9CAF88">Rich Chocolate Brown</text>
  <!-- Personality -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8956E" font-style="italic">Gentle · Loyal · Quiet</text>
  <!-- Brand mark -->
  <text x="200" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#D4A853" letter-spacing="3">MOCHIDOG</text>
</svg>